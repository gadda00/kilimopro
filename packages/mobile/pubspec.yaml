name: kilimopro
description: AI-Powered Agricultural Intelligence for Kenyan Farmers
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State management
  provider: ^6.1.2
  
  # Networking
  http: ^1.2.2
  dio: ^5.7.0
  
  # Local storage (offline-first)
  sqflite: ^2.4.1
  path_provider: ^2.1.5
  shared_preferences: ^2.3.2
  
  # Camera & image picking
  camera: ^0.11.0+2
  image_picker: ^1.1.2
  
  # TensorFlow Lite (on-device ML)
  tflite_flutter: ^0.11.0
  
  # Maps & location
  geolocator: ^13.0.1
  google_maps_flutter: ^2.9.0
  
  # Notifications
  flutter_local_notifications: ^17.2.3
  firebase_messaging: ^15.1.3
  firebase_core: ^3.6.0
  
  # UI
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1
  fl_chart: ^0.69.0
  
  # SMS/USSD fallback
  telephony: ^0.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/models/
    - assets/images/
    - assets/icons/
  
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
